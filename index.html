# CP as a subfield of computational science


- CP is a subfield of computational science.


- CP is a multidisciplinary subject combining aspects of physics, applied mathematics, and computer
science, with the aim of solving *realistic physics problems*. 

- Other computational sciences replace the physics with biology, chemistry, engineering, and so on, and
together face grand challenge problems such as
Climate prediction,  
 Materials science, 
 Structural biology,
 Superconductivity, 
 Semiconductor design, 
 Drug design,
 Human genome, 
 **Quantum chromodynamics** (strongly interacting field theories),
 Turbulence,
 Speech and vision, 
 Relativistic astrophysics, 
 Vehicle dynamics,
 Nuclear fusion, etc 


---
# Computational science \\(\ne \\) computer science 

Whereas related, computational science is not computer science. 

- Computer science studies
computing for its own intrinsic interest and develops the hardware and software tools that computational scientists use. 

- Likewise, applied mathematics develops and studies the algorithms
that computational scientists use. 

- The focus of this course  is on solving physical problems; 
we need to understand the computer science  and math tools well enough to be able to solve our problems correctly.



---

## Albert Einstein:

- Computers are incredibly fast, accurate, and stupid; 


- humans are incredibly slow, inaccurate, and brilliant; 


- together they are powerful beyond imagination.


Computers follow your instructions. We will use Python to "communicate" instructions to computer.

# Python 

The Python language is actually 
1. a core programming language 
2. plus a family of packages.

1 and 2 together  comprise an ecosystem for computing.

These packages and combination
of them extend the language to meet the specialized needs of science, engineering etc. 

For example, symbolic and mathematical computing (like
that in Maple and Mathematica) can be done with the packages, Sympx, mpmath and Sage.

Sympx does algebraic computing. Mpmath is a library for multiprecision floating-point arithmetic that also contains many high-level mathematical operations, while Sage combines many
open-source packages to create a viable, free and in some ways superior alternative to Maple,
Mathematica and Matlab. 


---

This course is mainly concerned with numerical computing. Thus  we will extensively use the following Python packages: **NumPy**, **matplotlib** and  **SciPy**. 

- **NumPy** brings high-level multidimensional arrays into Python, and is used as the basis for many of the numerical procedures in its
libraries.

- **Matplotlib** provides the tools for data visualization (2-D and 3-D plots of publication quality).

- **SciPy** is a collection of tools that provides wrapper
for many existing libraries in other languages, such as **LAPACK**  (linear algebra) and
**FFT** (fast Fourier transforms).

# Error Analysis:
---------------------------------------------


Sources of errors:

-   Experimental/Statistical uncertainty

-   Rounding errors

-   Truncation errors

To understand *rounding errors* we have to consider machine representation for floating point numbers 


---

# Machine numbers
---------------------------------------------

Floating point numbers are internally stored as the product of 

- sign, \\(s\\),

- binary mantissa, \\(m\\),

- and an exact integer exponent, \\(E\\) 

$$s\times m\times 2^{E-e}$$ 

\\(e\\) is the so-called bias of
the exponent, a fixed integer constant for any given machine.

---

# Mantissa
---------------------------------------------


- Mantissa is usually normalized such that its first bit is 1 and its
value is between 1 and 2.

- For this reason, mantissa can be written as
$$m=1.f$$

- \\(f\\) is called fraction and consists of the bits that
actually are stored (no need to store 1).

---

# Exponent 
-------- 

- for 32-bit float, the exponent is represented in 8 bits (with \\(e\\)=127),
the mantissa in 23; 

- for 64-bit double, the exponent in 11 bits (\\(e=\\)1023), the mantissa, 52.

---

# Largest 32-bit float and overflow  
-------- 


The largest 32-bit float number can be obtained using the following
logic: 

- 8-bits for the exponent mean, that \\(E_{max}=2^8-1\\), 

- the largest exponent 255 is reserved for \\(\pm \infty\\) 

- the largest mantissa (\\(32-8-1 = 23\\) bits) 

$$ m = 1.f   = 1 + m\_{22}  2^{22-23}  + m\_{21} 2^{21-23} + \ldots + m\_{0} 2^{0-23} $$

$$= 1 + 2^{-2} + 2^{-4} + \ldots +   2^{-23} \approx 2 $$

Therefore maximal number is \\(3.4 \times 10^{38}\\). A 32-bit float larger
than this number will lead to the **overflow** error.


---

# Roundoff errors
-------------

- Input numbers are not machine numbers and have to be rounded to the
nearest machine number. 

- This is described by a formal mapping
\\(\texttt{R} \to A\\) 
$$x\to r(x)\,.$$

- The smallest floating-point number that when added to the floating-point
number 1, produces a floating-point result different from 1 is termed
the *machine accuracy* 
\\(\epsilon_m \\). 

- It corresponds to to a change of one
in the least significant bit of the mantissa.

---

# Roundoff errors
-------------


- Important to remember that the smallest number that can be represented
numerically is defined largely by the exponent; 

- The machine
accuracy is defined by the mantissa! 

- Any arithmetic operation among
floating numbers leads to an introduction of an additional fractional
error of at *least* \\(\epsilon_m\\). 

- This is *roundoff error*.


---

# Roundoff errors
-------------


- Important to remember that the smallest number that can be represented
numerically is defined largely by the exponent; 

- The machine
accuracy is defined by the mantissa! 

- Any arithmetic operation among
floating numbers leads to an introduction of an additional fractional
error of at *least* \\(\epsilon_m\\). 

- This is *roundoff error*.


---

# Roundoff errors
-------------


 - If you perform \\(N\\) arithmetic calculations, you might be lucky to have a
total roundoff error on the order of \\(\sqrt{N}\epsilon_m\\). 

- The square
signifies one dimensional random-walk. 

- However, due to regularities in
the algorithms, often the total roundoff error is of order
\\(N\epsilon_m\\).



---

# Addition 
--------------

- Consider the sum of two floating point numbers 
$$
    y = x_1 + x_2 \,.  
$$ 

- The input has to be approximated
by the machine representation 
$$ x\_{1,2} \to r(x\_{1,2}) = x\_{1,2}(1+\epsilon\_{1,2})  \,.  $$
- The sum of \\(r(x_{1,2})\\) does not have to be exactly representable by an
exact machine number, thus there is an associated error \\(\alpha\\):
$$ \widetilde {y} = r(r(x_1)+r(x_2)) = \left[ x_1 (1+\epsilon_1) + x_2 (1+\epsilon_2)\right] (1+\alpha) $$ 
$$ \approx y + x_1 \epsilon_1 + x_2\epsilon_2 + y \alpha\,. $$


---

# Addition 
--------------

- Therefore the relative error 
$$
\frac{\widetilde y -y}{y} =  \frac{x_1}{x_1+x_2} \epsilon_1 + \frac{x_2}{x_1+x_2}\epsilon_2 + \alpha\,
$$
is the largest when \\(x_1 \approx - x_2\\).

- This is not an uncommon situation! 

- Example 
$$ x = \frac{-b + \sqrt{b^2-4ac}}{2}$$ 
for \\(b>0\\) and
\\(ac\ll b^2\\) finding \\(x\\) has to be done in a delicate way. 


---

# Multiplication 

-------

- Multiplication of two floating point numbers 
$$ y = x_1 \times x_2 \,. $$ 

- The result 
$$ \widetilde y =  x_1 (1+\epsilon_1) \times  x_2 (1+\epsilon_2) \times  (1+\beta) \approx y \, (1+\epsilon_1+\epsilon_2+\beta) \,. $$

- Therefore the relative error 
$$ \frac{\widetilde y -y}{y} =  \epsilon_1 + \epsilon_2 + \beta$$
is not enhanced for any values of \\(x_1\\) and \\(x_2\\).

---

# Error propagation  

-------

- Consider input data
$$ \overrightarrow{x}  = (x_1,x_2,\ldots,x_n) $$ 
to be used to compute a set of output data 
$$ \overrightarrow{y}  = (y_1,y_2,\ldots,y_n) = f(\overrightarrow{x})\,. $$

- The influence of numerical error can be analyzed by assuming that the
error \\(\Delta \overrightarrow{x} \\) due to roundoff error and potential experimental
uncertainties in determining \\(\overrightarrow{x}\\) is small

---

# Error propagation  

-------


$$ \overrightarrow{\widetilde y}  = r [ f(\overrightarrow{x} + \Delta \overrightarrow{x}) ]  $$ $$ = \left( f (\overrightarrow{x}) + \left(\frac{ \partial y }{ \partial x } \right) \Delta \overrightarrow{x}\right) (1+\epsilon) \,,$$
where 
$$ \left(\frac{ \partial y }{ \partial x } \right)_{i,j}  = \left(\frac{ \partial y_i }{ \partial x_j } \right) \, $$
and
\\( \epsilon = {\rm diag} (\epsilon_1,\epsilon_2, \ldots , \epsilon_n) \\).
